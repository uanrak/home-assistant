blueprint:
  name: "Control de luces con sensores y script opcional"
  description: "Enciende luces o ejecuta un script si hay presencia. Apaga las luces tras un tiempo sin detección. También enciende luces si una puerta se abre y no hay presencia."
  domain: automation
  input:
    sensores_presencia:
      name: Sensores de presencia
      description: "Selecciona los sensores de presencia a monitorear."
      selector:
        entity:
          domain: binary_sensor
          device_class: motion
          multiple: true

    luces:
      name: Luces
      description: "Selecciona las luces que se encenderán y apagarán automáticamente si no hay script."
      selector:
        entity:
          domain: light
          multiple: true

    sensores_puerta:
      name: Sensores de puerta
      description: "Selecciona los sensores de puerta que activarán las luces (deben ser binary_sensor)."
      selector:
        entity:
          domain: binary_sensor
          multiple: true

    tiempo_apagado:
      name: Tiempo de apagado
      description: "Tiempo en minutos antes de apagar las luces si no hay presencia."
      default: 5
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: "minutos"

    script_encendido:
      name: Script de encendido (opcional)
      description: "Si se define, se ejecutará este script en lugar de encender las luces directamente."
      default: ""
      selector:
        entity:
          domain: script

mode: restart

variables:
  script_configurado: "{{ script_encendido != '' }}"

trigger:
  - platform: state
    entity_id: !input sensores_presencia
    to: "on"
    id: "presencia_detectada"

  - platform: state
    entity_id: !input sensores_presencia
    to: "off"
    for:
      minutes: !input tiempo_apagado
    id: "sin_presencia"

  - platform: state
    entity_id: !input sensores_puerta
    to: "on"
    id: "puerta_abierta"

condition: []

action:
  - choose:
      - conditions:
          - condition: trigger
            id: "presencia_detectada"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ script_configurado }}"
                sequence:
                  - service: script.turn_on
                    target:
                      entity_id: !input script_encendido
            default:
              - service: light.turn_on
                target:
                  entity_id: !input luces

      - conditions:
          - condition: trigger
            id: "sin_presencia"
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input luces

      - conditions:
          - condition: trigger
            id: "puerta_abierta"
          - condition: state
            entity_id: !input sensores_presencia
            state: "off"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ script_configurado }}"
                sequence:
                  - service: script.turn_on
                    target:
                      entity_id: !input script_encendido
            default:
              - service: light.turn_on
                target:
                  entity_id: !input luces
